[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@wormhole-foundation/wormhole-solidity-sdk/=../../node_modules/@wormhole-foundation/wormhole-solidity-sdk/contracts/",
]
allow_paths = ["../../node_modules"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
arbitrum = { key = "${ETHERSCAN_API_KEY}", chain = 42161 }
