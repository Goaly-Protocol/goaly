name: Deploy API to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'bun.lock'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Rsync to VPS
        run: |
          rsync -az \
            --exclude 'node_modules' --exclude '.git' --exclude '.next' --exclude '.turbo' \
            --exclude 'apps/api/data' --exclude '*.db' --exclude '*.db-*' \
            --exclude '.env' --exclude '.env.*' \
            --exclude 'packages/contracts/lib' --exclude 'packages/contracts/out' --exclude 'packages/contracts/cache' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/goaly/"
      - name: Install deps + restart API
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash -lc 'cd ~/goaly && bun install && pm2 restart goaly-api --update-env'"
